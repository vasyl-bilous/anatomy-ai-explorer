# Local one-command run: `docker compose up --build`
# Brings up Postgres + the API (which migrates, seeds, then serves the SPA + API
# on http://localhost:4000). The API waits for Postgres to be healthy first.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anatomy_ai_explorer
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d anatomy_ai_explorer']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    environment:
      NODE_ENV: production
      PORT: 4000
      # `db` is the compose service hostname on the shared network.
      DATABASE_URL: postgresql://postgres:postgres@db:5432/anatomy_ai_explorer?schema=public
      CORS_ORIGINS: http://localhost:4000
    ports:
      - '4000:4000'
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
